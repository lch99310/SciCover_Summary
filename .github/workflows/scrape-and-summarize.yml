name: Fetch & Summarise Cover Stories

on:
  schedule:
    # Every 3 days at 06:00 Sydney time (AEDT=UTC+11 → 19:00 UTC previous day)
    - cron: "0 19 */3 * *"
  workflow_dispatch:
    inputs:
      journals:
        description: >-
          Comma-separated journal names, or 'all'.
          Available: science, nature, cell, polgeog,
          intorg, asr, political geography,
          international organization,
          american sociological review
        required: false
        default: "all"

permissions:
  contents: write                  # push data/ back to repo
  pages: write                     # deploy to GitHub Pages
  id-token: write                  # required by deploy-pages

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      has_changes: ${{ steps.push.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine journals to fetch
        id: journals
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "args=${{ github.event.inputs.journals }}" >> "$GITHUB_OUTPUT"
          else
            echo "args=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch articles via OpenAlex
        run: |
          JOURNALS="${{ steps.journals.outputs.args }}"
          if [ "$JOURNALS" = "all" ] || [ -z "$JOURNALS" ]; then
            python -m scripts.main --journal all
          else
            # Comma-separated list from workflow_dispatch
            IFS=',' read -ra NAMES <<< "$JOURNALS"
            ARGS=""
            for name in "${NAMES[@]}"; do
              ARGS="$ARGS --journal $(echo $name | xargs)"
            done
            python -m scripts.main $ARGS
          fi
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          # ── Free summariser backends (tried in priority order) ──────────────
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_KEY_GLAI: ${{ secrets.OPENROUTER_KEY_GLAI }}
          OPENROUTER_KEY_NVIDIA: ${{ secrets.OPENROUTER_KEY_NVIDIA }}
          OPENROUTER_KEY_QWEN3: ${{ secrets.OPENROUTER_KEY_QWEN3 }}
          OPENROUTER_KEY_MINIMAX: ${{ secrets.OPENROUTER_KEY_MINIMAX }}
          OPENROUTER_FREE_API_KEY: ${{ secrets.OPENROUTER_FREE_API_KEY }}
          # ── Paid fallback — only used when ALL free backends fail ───────────
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config user.name  "SciCover Bot"
          git config user.email "scicover-bot@users.noreply.github.com"
          # Clean up Python bytecode so it doesn't cause unstaged-changes errors
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update cover-story data"
            # Stash any remaining untracked/unstaged files before rebase
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
        id: push

  deploy:
    needs: fetch
    if: needs.fetch.outputs.has_changes == 'true'
    uses: ./.github/workflows/deploy.yml
