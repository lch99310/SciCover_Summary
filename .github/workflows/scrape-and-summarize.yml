name: Fetch & Summarise Cover Stories

on:
  schedule:
    # Weekly: every Saturday 06:00 UTC (natural-science journals)
    - cron: "0 6 * * 6"
    # Bimonthly: 1st and 15th of each month 06:00 UTC (social-science journals)
    - cron: "0 6 1,15 * *"
  workflow_dispatch:
    inputs:
      journals:
        description: "Journals to fetch (comma-separated, or 'all')"
        required: false
        default: "all"

permissions:
  contents: write                  # push data/ back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Determine journals to fetch
        id: journals
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: use user-provided list
            echo "args=${{ github.event.inputs.journals }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 6 * * 6" ]; then
            # Saturday cron: natural-science journals only
            echo "args=natural" >> "$GITHUB_OUTPUT"
          else
            # 1st/15th cron: social-science journals only
            echo "args=social" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch articles via OpenAlex
        run: |
          JOURNALS="${{ steps.journals.outputs.args }}"
          if [ "$JOURNALS" = "all" ] || [ -z "$JOURNALS" ]; then
            python -m scripts.main --journal all
          elif [ "$JOURNALS" = "natural" ]; then
            python -m scripts.main --journal science --journal nature --journal cell
          elif [ "$JOURNALS" = "social" ]; then
            python -m scripts.main --journal polgeog --journal intorg --journal asr
          else
            # Comma-separated list from workflow_dispatch
            IFS=',' read -ra NAMES <<< "$JOURNALS"
            ARGS=""
            for name in "${NAMES[@]}"; do
              ARGS="$ARGS --journal $(echo $name | xargs)"
            done
            python -m scripts.main $ARGS
          fi
        env:
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          MODELS_PAT_QWEN3_VL_30B: ${{ secrets.MODELS_PAT_QWEN3_VL_30B }}
        continue-on-error: true

      - name: Commit and push updated data
        run: |
          git config user.name  "SciCover Bot"
          git config user.email "scicover-bot@users.noreply.github.com"
          # Clean up Python bytecode so it doesn't cause unstaged-changes errors
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update cover-story data [skip ci]"
            # Stash any remaining untracked/unstaged files before rebase
            git stash --include-untracked || true
            git pull --rebase origin main
            git stash pop || true
            git push
          fi
